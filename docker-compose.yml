version: '3.8'

services:
  # ============================================
  # DATA: PostgreSQL (exclusivo do Evolution, rede interna)
  # ============================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-evolution}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evolution} -d ${POSTGRES_DB:-evolution}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MESSAGING: RabbitMQ
  # Evolution publica; CRM (leadpronto.ai) consome
  # via rede compartilhada Coolify ou porta AMQP
  # ============================================
  rabbitmq:
    build:
      context: .
      dockerfile: docker/rabbitmq.Dockerfile
    image: evolution-infra-rabbitmq
    restart: unless-stopped
    hostname: evolution-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-evolution}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-evolution}
      RABBITMQ_CRM_PASSWORD: ${RABBITMQ_CRM_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      internal:
      leadpronto_shared:
        aliases:
          - evolution-rabbitmq
          - rabbitmq
    # Descomente se o CRM não estiver na rede compartilhada:
    # ports:
    #   - "${RABBITMQ_PUBLISH_PORT:-5672}:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # CORE: Evolution API (monitoring-only, lean)
  # ============================================
  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    # Coolify expõe via proxy/domínio — não publique ports no host
    expose:
      - "8080"
    environment:
      # --- Core Server ---
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}

      # --- Auth ---
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: false

      # --- Logging: Minimal ---
      LOG_LEVEL: ERROR,WARN
      LOG_COLOR: false
      LOG_BAILEYS: error
      EVENT_EMITTER_MAX_LISTENERS: 50

      # --- Database: Postgres exclusivo do Evolution (override via DATABASE_CONNECTION_URI) ---
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${DATABASE_CONNECTION_URI}
      DATABASE_CONNECTION_CLIENT_NAME: ${DATABASE_CONNECTION_CLIENT_NAME:-evolution_prod}

      # --- Persistence: NÃO salva mensagens (CRM é a fonte da verdade) ---
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: false
      DATABASE_SAVE_MESSAGE_UPDATE: false
      DATABASE_SAVE_DATA_CONTACTS: false
      DATABASE_SAVE_DATA_CHATS: false
      DATABASE_SAVE_DATA_LABELS: false
      DATABASE_SAVE_DATA_HISTORIC: false
      DATABASE_SAVE_IS_ON_WHATSAPP: false
      DATABASE_DELETE_MESSAGE: false

      # --- Instance Lifecycle ---
      DEL_INSTANCE: false

      # --- RabbitMQ: interno (override via RABBITMQ_URI) ---
      RABBITMQ_ENABLED: true
      RABBITMQ_URI: ${RABBITMQ_URI}
      RABBITMQ_EXCHANGE_NAME: ${RABBITMQ_EXCHANGE_NAME:-evolution}
      RABBITMQ_GLOBAL_ENABLED: true
      # Apenas eventos essenciais
      RABBITMQ_EVENTS_MESSAGES_UPSERT: true
      RABBITMQ_EVENTS_CONNECTION_UPDATE: true
      RABBITMQ_EVENTS_INSTANCE_CREATE: true
      RABBITMQ_EVENTS_INSTANCE_DELETE: true
      # Todos os demais desabilitados explicitamente
      RABBITMQ_EVENTS_APPLICATION_STARTUP: false
      RABBITMQ_EVENTS_QRCODE_UPDATED: false
      RABBITMQ_EVENTS_MESSAGES_SET: false
      RABBITMQ_EVENTS_MESSAGES_EDITED: false
      RABBITMQ_EVENTS_MESSAGES_UPDATE: false
      RABBITMQ_EVENTS_MESSAGES_DELETE: false
      RABBITMQ_EVENTS_SEND_MESSAGE: false
      RABBITMQ_EVENTS_CONTACTS_SET: false
      RABBITMQ_EVENTS_CONTACTS_UPSERT: false
      RABBITMQ_EVENTS_CONTACTS_UPDATE: false
      RABBITMQ_EVENTS_PRESENCE_UPDATE: false
      RABBITMQ_EVENTS_CHATS_SET: false
      RABBITMQ_EVENTS_CHATS_UPSERT: false
      RABBITMQ_EVENTS_CHATS_UPDATE: false
      RABBITMQ_EVENTS_CHATS_DELETE: false
      RABBITMQ_EVENTS_GROUPS_UPSERT: false
      RABBITMQ_EVENTS_GROUP_UPDATE: false
      RABBITMQ_EVENTS_GROUP_PARTICIPANTS_UPDATE: false
      RABBITMQ_EVENTS_CALL: false
      RABBITMQ_EVENTS_TYPEBOT_START: false
      RABBITMQ_EVENTS_TYPEBOT_CHANGE_STATUS: false

      # --- Webhooks / Websocket / Cache: Disabled ---
      WEBHOOK_GLOBAL_ENABLED: false
      WEBHOOK_GLOBAL_URL: ''
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: false
      WEBSOCKET_ENABLED: false
      WEBSOCKET_GLOBAL_EVENTS: false
      CACHE_REDIS_ENABLED: false
      CACHE_LOCAL_ENABLED: false

      # --- Session ---
      CONFIG_SESSION_PHONE_CLIENT: Evolution
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: 30
      QRCODE_COLOR: '#175197'

      # --- Integrations: All disabled ---
      OPENAI_ENABLED: false
      DIFY_ENABLED: false
      FLOWISE_ENABLED: false
      N8N_ENABLED: false
      TYPEBOT_ENABLED: false
      CHATWOOT_ENABLED: false
      CHATWOOT_MESSAGE_READ: false
      CHATWOOT_MESSAGE_DELETE: false
      SQS_ENABLED: false
      PUSHER_ENABLED: false
      WA_BUSINESS_TOKEN_WEBHOOK: evolution
      WA_BUSINESS_URL: https://graph.facebook.com
      WA_BUSINESS_VERSION: v20.0
      WA_BUSINESS_LANGUAGE: pt_BR
      S3_ENABLED: false
      LANGUAGE: ${LANGUAGE:-pt_BR}

    volumes:
      - evolution_instances:/evolution/instances

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    networks:
      - internal

    # Coolify / Compose standalone: mem_limit em vez de deploy.resources
    mem_limit: 3g
    mem_reservation: 512m

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # ============================================
  # MONITORING: cAdvisor
  # ============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"
    command:
      - --housekeeping_interval=15s
      - --docker_only=true
      - --store_container_labels=false
      - --allow_dynamic_housekeeping=true
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MONITORING: Prometheus
  # ============================================
  prometheus:
    build:
      context: .
      dockerfile: docker/prometheus.Dockerfile
    image: evolution-infra-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
    networks:
      - internal
      - default
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MONITORING: Grafana
  # ============================================
  grafana:
    build:
      context: .
      dockerfile: docker/grafana.Dockerfile
    image: evolution-infra-grafana
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Rede privada: postgres (Evolution), evolution-api, rabbitmq
  internal:
    driver: bridge

  # Rede compartilhada entre stacks Coolify (ex.: leadpronto.ai)
  # Criar antes do deploy: docker network create leadpronto_shared
  leadpronto_shared:
    external: true
    name: ${COOLIFY_SHARED_NETWORK:-leadpronto_shared}

volumes:
  evolution_instances:
    driver: local
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
